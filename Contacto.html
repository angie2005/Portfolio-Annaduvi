<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Annaduvi</title>
    <link rel="stylesheet" href="stylescontacto.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&display=swap" rel="stylesheet">
    
</head>

<body>

  <!-- HEADER -->

  <header class="header">

    <nav class="nav container">

      <div class="menu">
        <a href="LINK PARA NAVEGAR"><img src="img/Menu.png" alt="Menu"> </a>
      </div>

      <h1 class="logo">ANNADUVI</h1>

      <div class="socials">

        <a href="LINK PARA NAVEGAR"><img src="img/Buscar.png" alt="Menu"> </a>
        <a href="https://www.instagram.com/"><img src="img/Instagram.png" alt="Menu"> </a>
        <a href="LINK PARA NAVEGAR"><img src="img/Gmail.png" alt="Menu"> </a>
      </div>
    </nav>
  </header>

  <div class="divider"></div>
  <img src="img/Regla.png">

  <div class="main-container">
        <h1 class="title">Contacto</h1>

        <div class="contact-frame-container">

            <form class="contact-form">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre">
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido">
                </div>

                <div class="form-group">
                    <label for="mail">Mail</label>
                    <input type="email" id="mail" name="mail">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono">
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje"></textarea>
                </div>

                <button type="submit" class="submit-btn">Enviar</button>
            </form>
        </div>
    </div>




  
  
  <!-- NEWSLETTER -->

  <img src="img/Regla.png">

  <section class="newsletter">
    <div class="newsletter-box">
      <span>Suscríbete para recibir novedades exclusivas</span>
      <button>Suscríbete</button>
    </div>
  </section>

  <!-- FOOTER -->

  <footer class="footer">
    © 2026 ANNADUVI
  </footer>

</body>
</html>
